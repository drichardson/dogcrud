name: ci

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest

    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        resolution: ["locked", "lowest-direct"]
        experimental: [false]
        include:
          - python-version: "3.15"
            resolution: "locked"
            experimental: true

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run Tests
      run: uv run ${{ matrix.resolution == 'lowest-direct' && '--resolution lowest-direct' || '' }} pytest

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Formatting and checks
      run: |
        uv run ruff format --check
        uv run ruff check

    - name: Check Types
      run: uv run mypy src/dogcrud tests

    - name: Check Python classifiers match CI matrix
      run: uv run --script scripts/check_python_classifiers.py

    - name: Check Python classifiers match CI matrix
      run: |
        python3 - <<'EOF'
        import tomllib, re, sys

        with open("pyproject.toml", "rb") as f:
            data = tomllib.load(f)

        classifier_versions = {
            c.removeprefix("Programming Language :: Python :: ")
            for c in data["project"]["classifiers"]
            if re.fullmatch(r"Programming Language :: Python :: 3\.\d+", c)
        }

        with open(".github/workflows/ci.yaml") as f:
            ci = f.read()

        # Extract the non-experimental matrix versions (the stable list)
        match = re.search(r'python-version: \[([^\]]+)\]\s*\n\s*resolution:', ci)
        matrix_versions = set(re.findall(r'"(3\.\d+)"', match.group(1)))

        if classifier_versions != matrix_versions:
            print(f"MISMATCH: classifiers={sorted(classifier_versions)}, matrix={sorted(matrix_versions)}")
            sys.exit(1)

        print(f"OK: {sorted(matrix_versions)}")
        EOF

  check:
    if: always()

    needs:
      - tests
      - lint

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
