name: ci

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest

    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        uv_resolution: ["highest", "lowest-direct"]
        experimental: [false]
        include:
          - uv_resolution: "highest"
            uv_locked: "true"
          - uv_resolution: "lowest-direct"
            uv_locked: "false"
          - python-version: "3.15"
            uv_resolution: "highest"
            uv_locked: "true"
            experimental: true

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Task
      uses: go-task/setup-task@v1

    - name: Determine primary Python version
      id: primary
      run: echo "version=$(scripts/ci_primary_python.py)" >> "$GITHUB_OUTPUT"

    - name: Run Tests
      run: task test
      env:
        UV_LOCKED: ${{ matrix.uv_locked }}
        UV_RESOLUTION: ${{ matrix.uv_resolution }}

    - name: Upload coverage report
      if: steps.primary.outputs.version == matrix.python-version && matrix.uv_resolution == 'highest'
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Task
      uses: go-task/setup-task@v1

    - name: Lint
      run: task lint

    - name: Check Python classifiers match CI matrix
      run: task check-classifiers

    - name: Typecheck
      run: task typecheck

  check:
    if: always()

    needs:
      - tests
      - lint

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
